<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>위치별 빵집 추천</title>

  <style>

    body{
      margin:0;
      font-family:sans-serif;
      background:#fff8f0;
    }

    .container{

      min-height:100vh;

      display:flex;
      flex-direction:column;

      justify-content:center;
      align-items:center;

      text-align:center;

      padding:40px;
    }

    h1{

      font-size:48px;

      color:#5c3d1e;

      margin-bottom:20px;
    }

    p{

      font-size:24px;

      color:#7a5a36;

      margin-bottom:50px;
    }

    .district-buttons{

      display:flex;

      justify-content:center;

      flex-wrap:wrap;

      gap:20px;
    }

    button{

      border:none;

      background:#d2a76f;

      color:white;

      font-size:26px;

      padding:20px 35px;

      border-radius:20px;

      cursor:pointer;

      transition:0.2s;
    }

    button:hover{

      background:#b98950;

      transform:translateY(-4px);
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>
      📍 위치별 빵집 추천
    </h1>

    <p>
      대전 지역별 인기 빵집들을 만나보세요
    </p>

    <div class="district-buttons">

      <button onclick="location.href='seo.html'">
        서구
      </button>

      <button onclick="location.href='yuseong.html'">
        유성구
      </button>

      <button onclick="location.href='jung.html'">
        중구
      </button>

      <button onclick="location.href='dong.html'">
        동구
      </button>

      <button onclick="location.href='daedeok.html'">
        대덕구
      </button>
 <!-- 대중교통 -->
  <button onclick="location.href='transport.html'">
    🚌 대중교통 코스 추천
</button>
    </div>

  </div>

</body>
</html>
