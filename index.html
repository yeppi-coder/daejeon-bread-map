<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>빵사유</title>

  <style>

    body{
      margin:0;
      font-family:sans-serif;
    }

    .hero{

      min-height:100vh;

      background-image:
      linear-gradient(
        rgba(255,255,255,0.7),
        rgba(255,255,255,0.7)
      ),
      url("./피크닉.png");

      background-size:cover;
      background-position:center;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:40px;
      box-sizing:border-box;
    }

    .container{

      background:rgba(255,255,255,0.88);

      padding:50px;

      border-radius:30px;

      width:100%;
      max-width:1300px;

      text-align:center;

      box-shadow:
      0 10px 30px rgba(0,0,0,0.15);
    }

    .title-box{

      display:flex;

      justify-content:center;

      align-items:center;

      gap:20px;

      margin-bottom:40px;

      flex-wrap:wrap;
    }

    .character{
      width:140px;
    }

    h1{

      font-size:48px;

      color:#5c3d1e;

      margin-bottom:15px;
    }

    .sub{

      font-size:28px;

      color:#7a5a36;

      margin-bottom:70px;
    }

    .district-buttons{

      display:flex;

      justify-content:center;

      flex-wrap:wrap;

      gap:40px;
    }

    /* 버튼 */

    .district-buttons button{

      width:360px;

      height:140px;

      border:none;

      border-radius:35px;

      background:#d2a76f;

      color:white;

      font-size:34px;

      font-weight:bold;

      cursor:pointer;

      transition:0.25s;

      box-shadow:
      0 10px 20px rgba(0,0,0,0.15);
    }

    .district-buttons button:hover{

      background:#b98950;

      transform:
      translateY(-6px)
      scale(1.03);
    }

    /* 모바일 */

    @media (max-width:768px){

      .container{
        padding:35px 20px;
      }

      .character{
        width:90px;
      }

      h1{
        font-size:34px;
      }

      .sub{
        font-size:18px;
        margin-bottom:40px;
      }

      .district-buttons{
        gap:20px;
      }

      .district-buttons button{

        width:260px;

        height:100px;

        font-size:24px;

        border-radius:25px;
      }

    }

  </style>

</head>

<body>

  <div class="hero">

    <div class="container">

      <div class="title-box">

        <!-- 꿈돌이 -->
        <img
          src="./꿈돌이.png"
          class="character">

        <!-- 제목 -->
        <div>

          <h1>
            🍞 빵사유 🍞
          </h1>

          <div class="sub">
            대전의 숨겨진 빵집으로 여행을 떠나보세요<!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Document</title>
            </head>
            <body>
                
            </body>
            </html>
          </div>

        </div>

        <!-- 꿈순이 -->
        <img
          src="./꿈순이.png"
          class="character">

      </div>

      <div class="district-buttons">

   

    <button onclick="location.href='./pages/location.html'">
        📍 위치별 빵집 추천
    </button>

     <button onclick="location.href='./pages/theme.html'">
        🥐 테마별 빵집 추천
    </button>

</div>

    </div>

  </div>

</body>
</html>
